{% extends 'base.html' %}
{% block title %}Profile - E-Learning Platform{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">Your Profile</h2>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
                {% if profile.avatar %}
                    <div class="mt-4">
                        <h5>Current Avatar</h5>
                        <img src="{{ profile.avatar.url }}" alt="Avatar" class="img-thumbnail" style="max-width: 180px;">
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
